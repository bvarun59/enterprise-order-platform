name: OrderService CI

on:
  push:
    branches:
      - main
    paths:
      - 'services/OrderService/**'
      - '.github/workflows/ci.yaml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/OrderService

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore OrderService.sln

      - name: Build
        run: dotnet build OrderService.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test OrderService.sln --configuration Release --no-build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download OWASP Dependency-Check
        run: |
          curl -L https://github.com/dependency-check/DependencyCheck/releases/latest/download/dependency-check-12.1.6-release.zip -o dependency-check.zip
          unzip dependency-check.zip

      - name: Run Dependency-Check
        run: |
          ./dependency-check/bin/dependency-check.sh \
            --project "OrderService" \
            --scan services/OrderService \
            --format HTML \
            --out reports

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/orderservice:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/orderservice:latest \
            .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/orderservice:${{ github.sha }}
          format: table
          ignore-unfixed: true
          exit-code: 1
          vuln-type: library
          severity: CRITICAL,HIGH

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/orderservice:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/orderservice:latest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key

          cosign sign \
            --key cosign.key \
            --yes \
            ${{ secrets.DOCKER_USERNAME }}/orderservice:${{ github.sha }}